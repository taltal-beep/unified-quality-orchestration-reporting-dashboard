name: Claude AI Code Review

# Automatically review every pull request when it is opened or updated.
# No "@claude" mention is required — the absence of a trigger_phrase means
# the action runs on all matching PR events.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least-privilege: read the code, post review comments. id-token is required
# by the action for its progress-tracking / OIDC flow.
permissions:
  contents: read
  pull-requests: write
  id-token: write

# Avoid stacking reviews if a PR is pushed to several times in quick succession.
concurrency:
  group: claude-cr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip drafts and bot-authored PRs (e.g. dependabot) to save usage.
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Claude can diff against the base branch

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          # Authenticate with the Claude Pro/Max subscription (no API credits).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Agent review mode: posts a tracking comment and updates progress.
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are an expert code reviewer for this Python project (pytest test
            orchestration + Streamlit dashboard, packaged as "testo").

            Review the changes in this pull request. Focus, in priority order:
              1. Correctness / logic errors and edge cases.
              2. Security flaws (injection, unsafe subprocess/shell use, secrets
                 in code, unsafe deserialization, path traversal, SSRF).
              3. Performance bottlenecks and resource leaks.
              4. Missing or weak test coverage for the changed behavior, given the
                 repo's tier_fast / tier_heavy / tier_external pytest markers.

            Do NOT comment on pure stylistic formatting. Leave inline comments on
            specific lines for concrete issues, and prefer a suggested fix over a
            vague concern. Use a single top-level comment for general observations
            or to say the PR looks good if you find nothing significant.

          # Grant the tools Claude needs to read the diff and post review comments.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --max-turns 25
