name: Claude AI Code Review

# Only trigger when a PR is opened or new code is pushed to it

on:
  pull_request:
    types: [opened, synchronize]

# CRITICAL SECURITY STEP: Strictly limit what this workflow can do
permissions:
  contents: read          # Can only read the code, cannot push changes
  pull-requests: write    # Can only post comments on the PR

jobs:
  claude-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetches the history so the AI can see the diffs
          
      # Replace this with the specific Claude action/script you decide to use

      - name: Run Claude Code Reviewer
        uses: broadinstitute/action-setup-claude@v1 # Example placeholder !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

        with:
          # Tell Claude to focus on logic, not stylistic nitpicks
          system_prompt: "You are an expert code reviewer. Focus on logic errors, security flaws, and performance bottlenecks. Do not comment on stylistic formatting."
