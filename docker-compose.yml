services:
  postgres:
    image: postgres:15-alpine
    container_name: uqo-postgres
    labels:
      com.testosterone.project: uqo
    ports:
      # PostgreSQL (DB) exposed on host for local tools
      - "5432:5432"
    environment:
      # Default DB credentials (change for production)
      POSTGRES_USER: uqo_admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: uqo_history
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uqo-net

  minio:
    image: minio/minio
    container_name: uqo-minio
    labels:
      com.testosterone.project: uqo
    command: server /data --console-address ":9001"
    ports:
      # MinIO S3-compatible API
      - "9000:9000"
      # MinIO admin console
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      # Helps the Console UI redirect correctly on macOS Docker networking
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || (command -v nc >/dev/null 2>&1 && nc -z localhost 9000) || (command -v bash >/dev/null 2>&1 && bash -lc '>/dev/tcp/127.0.0.1/9000') || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - uqo-net

  minio-init:
    image: minio/mc
    container_name: uqo-minio-init
    labels:
      com.testosterone.project: uqo
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -eu
      echo "Waiting for MinIO..."
      until mc alias set uqo-minio http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
        sleep 2
      done
      echo "Creating bucket uqo-artifacts (if missing)..."
      mc mb --ignore-existing uqo-minio/uqo-artifacts
      echo "Setting public download policy on uqo-artifacts..."
      mc anonymous set download uqo-minio/uqo-artifacts
      echo "MinIO initialization complete."
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    networks:
      - uqo-net
    restart: "no"

  allure-static:
    image: nginx:alpine
    container_name: uqo-allure-static
    labels:
      com.testosterone.project: uqo
    ports:
      - "5050:80"
    volumes:
      - ./deploy/nginx/allure-reports.conf:/etc/nginx/conf.d/default.conf:ro
      - allure_reports:/usr/share/nginx/html/reports:ro
    networks:
      - uqo-net

  allure-reports-sync:
    image: minio/mc
    container_name: uqo-allure-reports-sync
    labels:
      com.testosterone.project: uqo
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -eu
      echo "[allure-reports-sync] configuring MinIO alias..."
      until mc alias set uqo-minio http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
        sleep 2
      done
      echo "[allure-reports-sync] mirroring s3://$${BUCKET_NAME:-uqo-artifacts}/reports -> /reports ..."
      mkdir -p /reports
      while true; do
        mc mirror --overwrite uqo-minio/"$${BUCKET_NAME:-uqo-artifacts}"/reports /reports >/dev/null 2>&1 || true
        sleep 5
      done
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      BUCKET_NAME: ${BUCKET_NAME:-uqo-artifacts}
    volumes:
      - allure_reports:/reports
    networks:
      - uqo-net
    restart: unless-stopped

networks:
  uqo-net:
    name: uqo-net
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  allure_reports:
