name: UQO Run
description: Run Unified Quality Orchestration via uqo CLI.
inputs:
  config-path:
    description: Path to the UQO YAML config file.
    required: true
  ci-mode:
    description: Enable strict CI machine-output mode.
    required: false
    default: "true"
  stream-json:
    description: Emit NDJSON stream before final summary.
    required: false
    default: "false"
  persist:
    description: Persist run metadata to configured repository backend.
    required: false
    default: "true"
  python-version:
    description: Python version used to run UQO.
    required: false
    default: "3.11"
outputs:
  exit_code:
    description: UQO process exit code.
    value: ${{ steps.run_uqo.outputs.exit_code }}
  run_id:
    description: First run ID from summary payload.
    value: ${{ steps.run_uqo.outputs.run_id }}
  summary_json:
    description: Final summary JSON object string.
    value: ${{ steps.run_uqo.outputs.summary_json }}
  summary_path:
    description: Absolute path to saved summary JSON file.
    value: ${{ steps.run_uqo.outputs.summary_path }}
  status:
    description: Normalized status string from exit code.
    value: ${{ steps.run_uqo.outputs.status }}
runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install UQO
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install uqo-core
    - name: Run UQO
      id: run_uqo
      shell: bash
      run: |
        python "${{ github.action_path }}/run_uqo_action.py" \
          --config-path "${{ inputs.config-path }}" \
          --ci-mode "${{ inputs.ci-mode }}" \
          --stream-json "${{ inputs.stream-json }}" \
          --persist "${{ inputs.persist }}"
