stages:
  - quality

variables:
  UQO_CONFIG_PATH: ".uqo/config.yaml"
  UQO_GHOST_MODE: "auto"
  UQO_STREAM_JSON: "false"
  UQO_PERSIST: "true"
  UQO_RUNNER_IMAGE: ""
  UQO_RUNNER_PREBUILT: "auto"

uqo_run:
  stage: quality
  image: python:3.11-slim
  script:
    - python -m pip install --upgrade pip
    - python -m pip install testo-core
    - |
      UQO_ARGS=(run --config "$UQO_CONFIG_PATH" --ci)
      if [ "$UQO_GHOST_MODE" = "true" ]; then
        UQO_ARGS+=(--ghost)
      elif [ "$UQO_GHOST_MODE" = "false" ]; then
        UQO_ARGS+=(--no-ghost)
      fi
      if [ "$UQO_STREAM_JSON" = "true" ]; then
        UQO_ARGS+=(--stream-json)
      fi
      if [ "$UQO_PERSIST" = "false" ]; then
        UQO_ARGS+=(--no-persist)
      fi
      uqo "${UQO_ARGS[@]}" | tee uqo-output.ndjson
    - tail -n 1 uqo-output.ndjson > uqo-summary.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - uqo-output.ndjson
      - uqo-summary.json
